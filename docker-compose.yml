version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library123
      POSTGRES_DB: library
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    command: >
      sh -c "
        echo 'Waiting 15 seconds for DB...';
        sleep 15;
        echo 'Starting app...';
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    # volumes:
    #   - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://library:library123@db:5432/library
      SECRET_KEY: coursework-secret-key-2024
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata: