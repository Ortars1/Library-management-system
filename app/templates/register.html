{% extends "base.html" %}
{% block content %}
<div class="container auth-container">
    <h2>Регистрация</h2>
    <div id="error-msg" class="error-msg" style="display:none;"></div>
    <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label>Логин (мин. 3 символа)</label>
            <input type="text" name="username" required minlength="3">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Пароль (мин. 4 символа)</label>
            <input type="password" name="password" required minlength="4">
        </div>
        <button type="submit" id="submit-btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 15px;">Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
<script>
    async function handleRegister(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Регистрация...';
        errorMsg.style.display = 'none';
        
        const formData = new FormData(e.target);
        const data = {
            username: formData.get('username'),
            email: formData.get('email'),
            password: formData.get('password')
        };
        
        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Регистрация успешна! Теперь войдите в систему.');
                window.location.href = '/login';
            } else {
                if (Array.isArray(result.detail)) {
                    errorMsg.textContent = result.detail.map(e => e.msg || e).join('\n');
                } else {
                    errorMsg.textContent = result.detail || 'Ошибка регистрации';
                }
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.textContent = 'Ошибка сети: ' + error.message;
            errorMsg.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Зарегистрироваться';
        }
    }
</script>
{% endblock %}
