{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Управление книгами</h2>
    
    <div class="form-section">
        <h3>➕ Добавить новую книгу</h3>
        <div id="add-error" class="error-msg" style="display:none;"></div>
        <form id="add-book-form" onsubmit="handleAddBook(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" name="isbn" required placeholder="Например: 978-5-123-45678-9">
                </div>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" name="title" required placeholder="Название книги">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Автор</label>
                    <input type="text" name="author" required placeholder="Имя автора">
                </div>
                <div class="form-group">
                    <label>Год издания</label>
                    <input type="number" name="year" required min="1000" max="2026" placeholder="2024">
                </div>
                <div class="form-group">
                    <label>Количество копий</label>
                    <input type="number" name="total_copies" value="1" min="1" required>
                </div>
            </div>
            <button type="submit" id="add-btn">Добавить книгу</button>
        </form>
    </div>
    
    <div class="form-section">
        <h3>📋 Список книг</h3>
        <div id="books-manage-list"></div>
    </div>
    
    <div class="form-section">
        <h3>📚 Активные выдачи (возврат книг)</h3>
        <div id="active-loans-list"></div>
    </div>
</div>
<script>
    const authToken = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    
    // Защита: только для библиотекаря и админа
    if (!user || (user.role !== 'librarian' && user.role !== 'admin')) {
        document.querySelectorAll('.form-section').forEach(el => {
            el.innerHTML = '<p class="error">Доступ запрещён. Эта страница только для библиотекаря и администратора.</p>';
        });
    } else {
        loadBooks();
        loadActiveLoans();
    }
    
    async function loadBooks() {
        try {
            const response = await fetch('/api/v1/books', {
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            if (!response.ok) {
                document.getElementById('books-manage-list').innerHTML = '<p class="error">Ошибка загрузки</p>';
                return;
            }
            
            const books = await response.json();
            renderBooks(books);
        } catch (error) {
            document.getElementById('books-manage-list').innerHTML = '<p class="error">Ошибка: ' + error.message + '</p>';
        }
    }
    
    function renderBooks(books) {
        const container = document.getElementById('books-manage-list');
        if (books.length === 0) {
            container.innerHTML = '<p class="no-data">Нет книг. Добавьте первую книгу выше.</p>';
            return;
        }
        
        container.innerHTML = `
            <table class="books-table">
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Автор</th>
                        <th>Год</th>
                        <th>ISBN</th>
                        <th>Доступно</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    ${books.map(book => `
                        <tr>
                            <td>${escapeHtml(book.title)}</td>
                            <td>${escapeHtml(book.author)}</td>
                            <td>${book.year}</td>
                            <td>${escapeHtml(book.isbn)}</td>
                            <td class="${book.available_copies > 0 ? 'available' : 'unavailable'}">
                                ${book.available_copies} / ${book.total_copies}
                            </td>
                            <td>
                                <button class="delete-btn" onclick="deleteBook(${book.id})">️ Удалить</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function handleAddBook(e) {
        e.preventDefault();
        const addBtn = document.getElementById('add-btn');
        const errorDiv = document.getElementById('add-error');
        
        addBtn.disabled = true;
        addBtn.textContent = 'Добавление...';
        errorDiv.style.display = 'none';
        
        const formData = new FormData(e.target);
        const data = {
            isbn: formData.get('isbn').trim(),
            title: formData.get('title').trim(),
            author: formData.get('author').trim(),
            year: parseInt(formData.get('year')),
            total_copies: parseInt(formData.get('total_copies'))
        };
        
        try {
            const response = await fetch('/api/v1/books', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + authToken
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Книга "' + data.title + '" добавлена!');
                e.target.reset();
                e.target.querySelector('[name="total_copies"]').value = '1';
                loadBooks();
            } else {
                if (Array.isArray(result.detail)) {
                    errorDiv.textContent = result.detail.map(err => err.msg || err).join('\n');
                } else {
                    errorDiv.textContent = result.detail || 'Ошибка';
                }
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Ошибка сети: ' + error.message;
            errorDiv.style.display = 'block';
        } finally {
            addBtn.disabled = false;
            addBtn.textContent = 'Добавить книгу';
        }
    }
    
    async function deleteBook(bookId) {
        if (!confirm('Удалить книгу? Это действие нельзя отменить.')) return;
        
        try {
            const response = await fetch('/api/v1/books/' + bookId, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Книга удалена');
                loadBooks();
                loadActiveLoans();
            } else {
                alert(result.detail || 'Ошибка удаления');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
    
    // Активные выдачи для возврата
    async function loadActiveLoans() {
        try {
            const response = await fetch('/api/v1/loans/all', {
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            if (!response.ok) {
                document.getElementById('active-loans-list').innerHTML = '<p class="error">Ошибка загрузки выдач</p>';
                return;
            }
            
            const loans = await response.json();
            renderActiveLoans(loans);
        } catch (error) {
            document.getElementById('active-loans-list').innerHTML = '<p class="error">Ошибка: ' + error.message + '</p>';
        }
    }
    
    function renderActiveLoans(loans) {
        const container = document.getElementById('active-loans-list');
        const active = loans.filter(l => l.status === 'active');
        
        if (active.length === 0) {
            container.innerHTML = '<p class="no-data">Нет активных выдач</p>';
            return;
        }
        
        container.innerHTML = `
            <table class="books-table">
                <thead>
                    <tr>
                        <th>Читатель</th>
                        <th>Книга</th>
                        <th>Дата выдачи</th>
                        <th>Вернуть до</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    ${active.map(loan => `
                        <tr>
                            <td><strong>${escapeHtml(loan.user_username)}</strong></td>
                            <td>${escapeHtml(loan.book_title)} — ${escapeHtml(loan.book_author)}</td>
                            <td>${formatDate(loan.loan_date)}</td>
                            <td>${formatDate(loan.due_date)}</td>
                            <td>
                                <button class="return-btn" onclick="returnLoan(${loan.id})">Вернуть книгу</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return '—';
        const date = new Date(dateStr);
        return date.toLocaleDateString('ru-RU');
    }
    
    async function returnLoan(loanId) {
        if (!confirm('Вернуть книгу?')) return;
        
        try {
            const response = await fetch('/api/v1/loans/' + loanId + '/return', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Книга возвращена');
                loadActiveLoans();
                loadBooks();
            } else {
                alert(result.detail || 'Ошибка возврата');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
</script>
{% endblock %}
