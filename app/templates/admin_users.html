{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Админ-панель: Управление пользователями</h2>
    <div id="users-list"></div>
</div>
<script>
    const authToken = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    
    // Защита: только для админа
    if (!user || user.role !== 'admin') {
        document.getElementById('users-list').innerHTML = '<p class="error">Доступ запрещён. Эта страница только для администратора.</p>';
    } else {
        loadUsers();
    }
    
    async function loadUsers() {
        try {
            const response = await fetch('/api/v1/admin/users', {
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            if (!response.ok) {
                document.getElementById('users-list').innerHTML = '<p class="error">Ошибка загрузки данных</p>';
                return;
            }
            
            const users = await response.json();
            renderUsers(users);
        } catch (error) {
            document.getElementById('users-list').innerHTML = '<p class="error">Ошибка: ' + error.message + '</p>';
        }
    }
    
    function getRoleName(role) {
        const roles = {
            'reader': 'Читатель',
            'librarian': 'Библиотекарь',
            'admin': 'Администратор'
        };
        return roles[role] || role;
    }
    
    function renderUsers(users) {
        const container = document.getElementById('users-list');
        if (users.length === 0) {
            container.innerHTML = '<p class="no-data">Нет пользователей</p>';
            return;
        }
        
        container.innerHTML = `
            <table class="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Логин</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td>${u.id}</td>
                            <td>${escapeHtml(u.username)}</td>
                            <td>${escapeHtml(u.email)}</td>
                            <td>${getRoleName(u.role)}</td>
                            <td>
                                ${u.username !== 'admin' ? `
                                    <select onchange="changeRole(${u.id}, this.value)" class="role-select">
                                        <option value="reader" ${u.role === 'reader' ? 'selected' : ''}>Читатель</option>
                                        <option value="librarian" ${u.role === 'librarian' ? 'selected' : ''}>Библиотекарь</option>
                                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Администратор</option>
                                    </select>
                                    <button onclick="deleteUser(${u.id})" class="delete-btn" style="margin-left: 5px;">️</button>
                                ` : '<span style="color: #999;">—</span>'}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    async function changeRole(userId, newRole) {
        if (!confirm('Изменить роль пользователя?')) return;
        
        try {
            const response = await fetch('/api/v1/admin/users/' + userId + '/role', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + authToken
                },
                body: JSON.stringify({ role: newRole })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Роль изменена');
                loadUsers();
            } else {
                alert(result.detail || 'Ошибка');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
    
    async function deleteUser(userId) {
        if (!confirm('Удалить пользователя? Это действие нельзя отменить.')) return;
        
        try {
            const response = await fetch('/api/v1/admin/users/' + userId, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + authToken
                }
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('Пользователь удален');
                loadUsers();
            } else {
                alert(result.detail || 'Ошибка удаления');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
</script>
{% endblock %}
