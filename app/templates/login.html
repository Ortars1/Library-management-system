{% extends "base.html" %}
{% block content %}
<div class="container auth-container">
    <h2>Вход в систему</h2>
    <div id="error-msg" class="error-msg" style="display:none;"></div>
    <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" id="submit-btn">Войти</button>
    </form>
    <p style="margin-top: 15px;">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    <p style="margin-top: 10px; font-size: 12px; color: #666;">
        Тестовый аккаунт: admin / admin123
    </p>
</div>
<script>
    async function handleLogin(e) {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Вход...';
        errorMsg.style.display = 'none';
        
        const formData = new FormData(e.target);
        const data = {
            username: formData.get('username'),
            password: formData.get('password')
        };
        
        try {
            const response = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                localStorage.setItem('token', result.access_token);
                localStorage.setItem('user', JSON.stringify(result.user));
                window.location.href = '/';
            } else {
                errorMsg.textContent = result.detail || 'Ошибка входа';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.textContent = 'Ошибка сети: ' + error.message;
            errorMsg.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Войти';
        }
    }
</script>
{% endblock %}
